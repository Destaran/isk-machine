services:
  site:
    image: isk-machine-site:latest
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://${PI_HOST:-192.168.0.50}:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - frontend

  backend:
    image: isk-machine-backend:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: isk-machine-db
      ENVIRONMENT: prod
      PORT: 3000
      FRONTEND_ORIGIN: http://${PI_HOST:-192.168.0.50}:5173
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - backend

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: isk-machine-db
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  pg_data:

networks:
  frontend:
    name: isk-machine-frontend
  backend:
    name: isk-machine-backend
