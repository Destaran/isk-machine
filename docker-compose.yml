services:
  site:
    image: site
    build:
      context: site
      target: dev
    volumes:
      - ./site/index.html:/app/index.html
      - ./site/vite.config.ts:/app/vite.config.ts
      - ./site/tsconfig.json:/app/tsconfig.json
      - ./site/public:/app/public
      - ./site/src:/app/src
    ports:
      - 5173:5173
    depends_on:
      - backend
    networks:
      - frontend
  backend:
    image: backend
    build:
      context: backend
      target: dev
    volumes:
      - ./backend/src:/backend/src
    restart: always
    ports:
      - 3000:3000
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: isk-machine-db
      ENVIRONMENT: dev
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - db
    networks:
      - backend
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: isk-machine-db
    networks:
      - backend

networks:
  frontend:
    name: isk-machine-frontend
  backend:
    name: isk-machine-backend
